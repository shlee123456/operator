# ============================================================================
# Grafana Loki Configuration
# ============================================================================
# Loki는 Prometheus에서 영감을 받은 로그 수집 시스템입니다.
# 로그를 인덱싱하지 않고 라벨만 인덱싱하여 효율적인 저장과 빠른 쿼리를 제공합니다.
# ============================================================================

# ============================================================================
# 인증 설정
# ============================================================================
# 테스트/개발 환경에서는 인증을 비활성화합니다
# 프로덕션 환경에서는 반드시 true로 설정하고 인증을 구성하세요
auth_enabled: false

# ============================================================================
# 서버 설정
# ============================================================================
server:
  http_listen_port: 3100  # HTTP API 포트 (로그 수신 및 쿼리)
  grpc_listen_port: 9096  # gRPC 포트 (내부 통신용)

# ============================================================================
# 공통 설정
# ============================================================================
common:
  path_prefix: /tmp/loki  # 모든 데이터 저장 기본 경로

  # 스토리지 설정
  storage:
    filesystem:
      chunks_directory: /tmp/loki/chunks  # 로그 청크 저장 디렉토리
      rules_directory: /tmp/loki/rules    # 알림 규칙 저장 디렉토리

  # 복제 설정 (단일 인스턴스 환경)
  replication_factor: 1  # 데이터 복제본 수 (HA 구성 시 3 이상 권장)

  # Ring 설정 (분산 환경에서 노드 간 조정)
  ring:
    instance_addr: 127.0.0.1  # 이 인스턴스의 주소
    kvstore:
      store: inmemory         # 키-값 저장소 타입 (단일 인스턴스용)
                             # 프로덕션에서는 consul, etcd 등 사용 권장

# ============================================================================
# 쿼리 범위 설정
# ============================================================================
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true      # 쿼리 결과 캐싱 활성화
        max_size_mb: 100   # 캐시 최대 크기 (MB)
                          # 메모리 사용량과 쿼리 성능 간 균형 조정

# ============================================================================
# 스키마 설정
# ============================================================================
# Loki의 인덱스 및 청크 저장 방식을 정의합니다
# 주의: 한 번 설정된 스키마는 변경하기 어려우므로 신중하게 선택하세요
schema_config:
  configs:
    # 레거시 스키마 (기존 데이터 호환성 유지)
    # 주의: 이미 저장된 데이터가 있다면 삭제하지 마세요
    - from: 2020-10-24
      store: boltdb-shipper      # 인덱스 저장 방식 (BoltDB)
      object_store: filesystem   # 청크 저장 위치 (로컬 파일시스템)
      schema: v11                # 스키마 버전
      index:
        prefix: index_           # 인덱스 파일 접두사
        period: 24h              # 인덱스 생성 주기 (24시간마다 새 인덱스)

    # 최신 스키마 (TSDB 기반 - 더 나은 성능)
    # 2025-09-22 이후의 모든 로그에 적용됩니다
    - from: 2025-09-22
      store: tsdb                # 인덱스 저장 방식 (TSDB - 시계열 데이터베이스)
      object_store: filesystem   # 청크 저장 위치
      schema: v13                # 최신 스키마 버전
      index:
        prefix: index_
        period: 24h

# ============================================================================
# 제한 설정
# ============================================================================
limits_config:
  # 구조화된 메타데이터 허용 (로그에 추가 메타데이터 첨부 가능)
  # 예: 요청 ID, 사용자 ID 등을 메타데이터로 저장하여 검색 가능
  allow_structured_metadata: true

# ============================================================================
# Ruler 설정 (알림 규칙 엔진)
# ============================================================================
ruler:
  # Alertmanager URL (알림을 전송할 대상)
  # 현재는 로컬 Alertmanager를 가리키지만, 실제 Alertmanager가 필요합니다
  alertmanager_url: http://localhost:9093
