# ============================================================================
# Grafana Datasources Provisioning Configuration
# ============================================================================
# Grafana가 시작될 때 자동으로 데이터 소스를 구성합니다.
# UI에서 수동으로 추가할 필요 없이 자동으로 Prometheus와 Loki가 연결됩니다.
# ============================================================================

apiVersion: 1

datasources:
  # --------------------------------------------------------------------------
  # Prometheus 데이터 소스
  # --------------------------------------------------------------------------
  # 메트릭 데이터를 시각화하기 위한 기본 데이터 소스입니다.
  - name: Prometheus
    type: prometheus                   # 데이터 소스 타입
    uid: prometheus                    # 고정 UID (대시보드에서 참조)
    access: proxy                      # 접근 방식: proxy (Grafana 서버를 통해 접근)
    url: http://prometheus:9090        # Prometheus 서버 URL (Docker 네트워크 내부 주소)
    isDefault: true                    # 기본 데이터 소스로 설정
    editable: true                     # UI에서 편집 가능
    # jsonData:                        # 추가 설정 (필요시 활성화)
    #   timeInterval: "15s"            # 최소 시간 간격
    #   httpMethod: POST               # HTTP 메서드
    # basicAuth: false                 # Basic 인증 비활성화
    # withCredentials: false           # 자격 증명 포함 여부

  # --------------------------------------------------------------------------
  # Loki 데이터 소스
  # --------------------------------------------------------------------------
  # 로그 데이터를 조회하고 시각화하기 위한 데이터 소스입니다.
  - name: Loki
    type: loki                         # 데이터 소스 타입
    uid: loki                          # 고정 UID (대시보드에서 참조)
    access: proxy                      # 접근 방식: proxy
    url: http://loki:3100              # Loki 서버 URL (Docker 네트워크 내부 주소)
    editable: true                     # UI에서 편집 가능
    jsonData:
      maxLines: 1000                   # 한 번에 표시할 최대 로그 라인 수
      # derivedFields:                 # 로그에서 추출할 필드 정의 (필요시 활성화)
      #   - name: "TraceID"            # 필드 이름
      #     matcherRegex: "trace_id=(\\w+)"  # 정규식 패턴
      #     url: "http://jaeger/trace/${__value.raw}"  # 링크 URL