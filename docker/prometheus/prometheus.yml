# prometheus.yml
global:
  scrape_interval: 15s
scrape_configs:
# Node Exporter: 서버의 시스템 메트릭 수집
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['10.0.1.10:9100']
        labels:
          instance: 'server-1'
          domainname: 'example'
      - targets: ['10.0.1.20:9100']
        labels:
          instance: 'server-2'
          domainname: 'example'
