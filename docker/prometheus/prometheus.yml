# ============================================================================
# Prometheus Configuration
# ============================================================================
# Prometheus는 메트릭 기반 모니터링 시스템으로 시계열 데이터를 수집하고 저장합니다.
# Pull 모델을 사용하여 주기적으로 타겟에서 메트릭을 수집합니다.
# ============================================================================

# ============================================================================
# 전역 설정
# ============================================================================
global:
  # 메트릭 수집 주기 (기본값)
  # 각 타겟에서 메트릭을 얼마나 자주 가져올지 설정합니다
  # 값이 작을수록 실시간에 가깝지만 리소스 사용량이 증가합니다
  scrape_interval: 15s

  # evaluation_interval: 15s  # 알림 규칙 평가 주기 (필요시 활성화)
  # scrape_timeout: 10s        # 수집 타임아웃 (필요시 활성화)

# ============================================================================
# 메트릭 수집 대상 설정
# ============================================================================
# 참고: 현재 로컬 호스트의 시스템 메트릭은 Alloy가 자동으로 수집합니다.
#       Alloy의 prometheus.exporter.unix 컴포넌트가 Node Exporter 역할을 수행하여
#       CPU, 메모리, 디스크, 네트워크 등의 메트릭을 Prometheus로 전송합니다.
#       아래 설정들은 원격 서버 모니터링이 필요한 경우에만 사용하세요.
# ============================================================================

scrape_configs:
  # --------------------------------------------------------------------------
  # [예시] 원격 서버의 Node Exporter 메트릭 수집
  # --------------------------------------------------------------------------
  # 다른 서버들을 모니터링하려면 각 서버에 Node Exporter를 설치하고
  # 아래 주석을 해제하여 타겟을 추가하세요.
  #
  # - job_name: 'node_exporter'
  #   static_configs:
  #     # 원격 서버 1
  #     - targets: ['10.0.1.10:9100']
  #       labels:
  #         instance: 'server-1'
  #         domainname: 'example'
  #         environment: 'production'
  #
  #     # 원격 서버 2
  #     - targets: ['10.0.1.20:9100']
  #       labels:
  #         instance: 'server-2'
  #         domainname: 'example'
  #         environment: 'production'

  # --------------------------------------------------------------------------
  # [예시] 추가 수집 대상
  # --------------------------------------------------------------------------
  # 애플리케이션 메트릭 수집 (Spring Boot Actuator, Node.js 등)
  # - job_name: 'my-application'
  #   static_configs:
  #     - targets: ['app-server:8080']
  #       labels:
  #         env: 'production'
  #         app: 'backend-api'
  #
  # Docker Engine 메트릭 수집
  # - job_name: 'docker'
  #   static_configs:
  #     - targets: ['docker-host:9323']
  #
  # MySQL Exporter
  # - job_name: 'mysql'
  #   static_configs:
  #     - targets: ['mysql-exporter:9104']
  #
  # Kubernetes 메트릭 수집 (서비스 디스커버리)
  # - job_name: 'kubernetes-pods'
  #   kubernetes_sd_configs:
  #     - role: pod
  #   relabel_configs:
  #     - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
  #       action: keep
  #       regex: true
