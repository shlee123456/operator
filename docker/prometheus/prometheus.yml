# ============================================================================
# Prometheus Configuration
# ============================================================================
# Prometheus는 메트릭 기반 모니터링 시스템으로 시계열 데이터를 수집하고 저장합니다.
# Pull 모델을 사용하여 주기적으로 타겟에서 메트릭을 수집합니다.
# ============================================================================

# ============================================================================
# 전역 설정
# ============================================================================
global:
  # 메트릭 수집 주기 (기본값)
  # 각 타겟에서 메트릭을 얼마나 자주 가져올지 설정합니다
  # 값이 작을수록 실시간에 가깝지만 리소스 사용량이 증가합니다
  scrape_interval: 15s

  # evaluation_interval: 15s  # 알림 규칙 평가 주기 (필요시 활성화)
  # scrape_timeout: 10s        # 수집 타임아웃 (필요시 활성화)

# ============================================================================
# 메트릭 수집 대상 설정
# ============================================================================
scrape_configs:
  # --------------------------------------------------------------------------
  # Node Exporter: 서버의 시스템 메트릭 수집
  # --------------------------------------------------------------------------
  # CPU, 메모리, 디스크, 네트워크 등 OS 레벨 메트릭을 수집합니다
  # 각 서버에 node_exporter를 설치하고 9100 포트로 메트릭을 노출해야 합니다
  - job_name: 'node_exporter'
    static_configs:
      # 첫 번째 서버
      - targets: ['10.0.1.10:9100']
        labels:
          instance: 'server-1'      # 서버 식별자
          domainname: 'example'     # 도메인 또는 환경 구분

      # 두 번째 서버
      - targets: ['10.0.1.20:9100']
        labels:
          instance: 'server-2'
          domainname: 'example'

  # --------------------------------------------------------------------------
  # 추가 수집 대상 예시 (필요시 활성화)
  # --------------------------------------------------------------------------
  # 애플리케이션 메트릭 수집
  # - job_name: 'my-application'
  #   static_configs:
  #     - targets: ['app-server:8080']
  #       labels:
  #         env: 'production'
  #
  # Docker 메트릭 수집
  # - job_name: 'docker'
  #   static_configs:
  #     - targets: ['docker-host:9323']
  #
  # Kubernetes 메트릭 수집 (서비스 디스커버리)
  # - job_name: 'kubernetes-pods'
  #   kubernetes_sd_configs:
  #     - role: pod
