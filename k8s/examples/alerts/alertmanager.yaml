apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      # Slack webhook URL (실제 환경에서 설정 필요)
      slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

    # 알림 템플릿
    templates:
    - '/etc/alertmanager/templates/*.tmpl'

    # 알림 라우팅
    route:
      # 기본 리시버
      receiver: 'default'
      # 같은 알림 그룹화
      group_by: ['alertname', 'cluster', 'service']
      # 첫 알림까지 대기 시간
      group_wait: 10s
      # 그룹에 새 알림이 추가되면 대기 시간
      group_interval: 10s
      # 같은 알림 반복 간격
      repeat_interval: 12h

      # 하위 라우트
      routes:
      # Critical 알림 -> PagerDuty + Slack
      - match:
          severity: critical
        receiver: critical-alerts
        continue: false

      # Warning 알림 -> Slack
      - match:
          severity: warning
        receiver: warning-alerts
        continue: false

      # Info 알림 -> Email
      - match:
          severity: info
        receiver: info-alerts
        continue: false

    # 알림 억제 규칙
    inhibit_rules:
    # 노드가 다운되면 해당 노드의 다른 알림 억제
    - source_match:
        alertname: 'NodeDown'
      target_match_re:
        instance: '.*'
      equal: ['instance']

    # Critical 알림이 있으면 같은 서비스의 Warning 억제
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'service']

    # 리시버 정의
    receivers:
    # 기본 리시버
    - name: 'default'
      slack_configs:
      - channel: '#monitoring-alerts'
        title: '알림: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

    # Critical 알림 리시버
    - name: 'critical-alerts'
      # PagerDuty 설정 (실제 환경에서 설정 필요)
      pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
        description: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'
      # Slack 설정
      slack_configs:
      - channel: '#critical-alerts'
        color: 'danger'
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}
        send_resolved: true

    # Warning 알림 리시버
    - name: 'warning-alerts'
      slack_configs:
      - channel: '#warning-alerts'
        color: 'warning'
        title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

    # Info 알림 리시버
    - name: 'info-alerts'
      email_configs:
      - to: 'monitoring@example.com'
        from: 'alertmanager@example.com'
        smarthost: 'smtp.example.com:587'
        auth_username: 'alertmanager@example.com'
        auth_password: 'password'
        headers:
          Subject: 'Info Alert: {{ .GroupLabels.alertname }}'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:latest
        args:
          - '--config.file=/etc/alertmanager/alertmanager.yml'
          - '--storage.path=/alertmanager'
        ports:
        - containerPort: 9093
          name: web
        volumeMounts:
        - name: config
          mountPath: /etc/alertmanager
        - name: storage
          mountPath: /alertmanager
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: config
        configMap:
          name: alertmanager-config
      - name: storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  type: ClusterIP
  ports:
  - port: 9093
    targetPort: 9093
    name: web
  selector:
    app: alertmanager
